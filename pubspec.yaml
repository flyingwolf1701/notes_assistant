name: notes_assistant
description: AI Voice-to-Obsidian Flutter App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio Recording
  record: ^5.1.2

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Local Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Obsidian / Android SAF
  shared_storage: 0.8.1

  # Utilities
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0

flutter:
  uses-material-design: true
