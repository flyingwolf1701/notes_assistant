name: notes_assistant
description: AI Voice-to-Obsidian Flutter App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio Recording (6.x keeps all platform plugins in sync)
  record: ^6.0.0

  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0

  # Local Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Audio Playback
  audioplayers: ^6.0.0

  # Date formatting
  intl: ^0.19.0

  # Image picking
  image_picker: 1.0.7

  # Utilities
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1

  # Desktop (Windows/macOS/Linux)
  window_manager: ^0.3.9
  tray_manager: ^0.2.3
  hotkey_manager: ^0.2.3
  file_picker: ^8.0.0

  # Phase 3 — Obsidian / Android SAF
  # shared_storage: discontinued — replacement TBD when implementing Phase 3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
